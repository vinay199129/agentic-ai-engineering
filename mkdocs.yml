site_name: agentic-ai-engineering
site_description: Hands-on portfolio of agentic AI engineering — RAG, indexing, frameworks, HITL, evals, MCP, deployment.
site_url: https://example.com/agentic-ai-engineering/
repo_url: https://github.com/vinay199129/agentic-ai-engineering
repo_name: agentic-ai-engineering
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.integrate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocs-jupyter:
      include_source: true
      ignore_h1_titles: true

nav:
  - Home: index.md
  - Dashboard: dashboard.md
  - Leaderboard: leaderboard.md
  - Learning path: learning-path.md
  - Skills matrix: skills-matrix.md
  - Architecture: architecture.md
  - Built from scratch: from-scratch.md
  - Real-world case studies: case-studies.md
  - Run in browser: browser-execution.md
  - Deep-dives:
    - Overview: deep-dives/index.md
    - GraphRAG: deep-dives/01-graphrag.md
    - Self-RAG vs CRAG: deep-dives/02-self-rag-vs-crag.md
    - HNSW internals: deep-dives/03-hnsw-internals.md
    - Framework comparison: deep-dives/04-framework-comparison.md
    - MCP: deep-dives/05-mcp.md
  - Architecture decisions:
    - Overview: architecture-decisions/README.md
    - 0001 uv over poetry: architecture-decisions/0001-uv-over-poetry.md
    - 0002 pgvector over dedicated vector DB: architecture-decisions/0002-pgvector-over-dedicated-vector-db.md
    - 0003 LangGraph over CrewAI: architecture-decisions/0003-langgraph-over-crewai-for-deep-dive-2.md
    - 0004 self-hosted Langfuse: architecture-decisions/0004-self-hosted-langfuse.md
    - 0005 MCP-only tools: architecture-decisions/0005-mcp-only-tools-in-deep-dive-2.md
    - 0006 arXiv corpus choice: architecture-decisions/0006-arxiv-corpus-choice.md
