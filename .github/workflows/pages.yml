name: Publish docs + JupyterLite to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure GitHub Pages
        # Fails fast with a clear error if Pages isn't enabled (Settings -> Pages
        # -> Source: GitHub Actions). Also exposes ${{ steps.pages.outputs.base_url }}
        # which the MkDocs build below uses as site_url.
        id: pages
        uses: actions/configure-pages@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install docs + jupyterlite + content deps
        # JupyterLite needs the same dep groups that the notebooks import so
        # any leaves we add to BROWSER_SAFE in scripts/build_jupyterlite.py
        # have their helpers available at build time.
        run: uv sync --group docs --group jupyterlite --group rag --group indexing --group evals --group hitl --group mcp --group foundations

      - name: Build dashboard + leaderboard + mirror leaves
        # Generate everything the docs site needs from repo state:
        #   1. mirror every leaf's README + notebook into docs/leaves/
        #   2. (re-)aggregate eval snapshots for dashboard/leaderboard
        #   3. rewrite legacy leaf links in the hand-written docs
        run: |
          uv run python scripts/sync_leaves_to_docs.py
          uv run python scripts/build_dashboard.py
          uv run python scripts/rewrite_leaf_links.py

      - name: Build MkDocs site
        env:
          # Inject the Pages URL so canonical <link> tags in <head> are correct
          # for the actual deployed site (overrides site_url in mkdocs.yml).
          MKDOCS_SITE_URL: ${{ steps.pages.outputs.base_url }}/
        run: uv run mkdocs build --strict

      - name: Build JupyterLite site (into site/lite/)
        run: uv run python scripts/build_jupyterlite.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
