name: Lint & Type Check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev deps
        run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        # Phase 0: no Python sources yet; soft-fail until first phase lands code.
        # Remove the `|| echo` once `shared/` exists.
        run: uv run mypy . || echo "mypy soft-fail while no Python sources exist"
